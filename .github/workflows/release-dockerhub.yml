name: Release Docker Image

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    env:
      DEFAULT_DOCKERHUB_IMAGE: rhjanssen/discogenius
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Validate repository configuration
        id: config
        run: |
          set -euo pipefail
          resolved_image="${DOCKERHUB_IMAGE:-$DEFAULT_DOCKERHUB_IMAGE}"
          if [[ -z "${{ secrets.DOCKERHUB_USERNAME }}" || -z "${{ secrets.DOCKERHUB_TOKEN }}" ]]; then
            echo "DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets are required." >&2
            exit 1
          fi
          echo "dockerhub_image=${resolved_image}" >> "$GITHUB_OUTPUT"

      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install Yarn
        run: npm install -g yarn@1.22.22

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build frontend
        run: yarn --cwd app build

      - name: Build backend
        run: yarn --cwd api build

      - name: Derive release metadata
        id: release
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          if [[ "${tag}" == "${version}" ]]; then
            echo "Release tags must start with v, got ${tag}" >&2
            exit 1
          fi
          if [[ "${version}" == *-* ]]; then
            latest=false
            prerelease=true
          else
            latest=true
            prerelease=false
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "latest=${latest}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"

      - name: Validate package versions match release tag
        run: |
          set -euo pipefail
          expected="${{ steps.release.outputs.version }}"
          app_version="$(node -e "console.log(require('./app/package.json').version)")"
          api_version="$(node -e "console.log(require('./api/package.json').version)")"
          if [[ "${app_version}" != "${expected}" || "${api_version}" != "${expected}" ]]; then
            echo "Tag version ${expected} must match app/api package versions (app=${app_version}, api=${api_version})" >&2
            exit 1
          fi

      - name: Build release notes body
        run: |
          set -euo pipefail
          version="${{ steps.release.outputs.version }}"
          changelog_body=""
          mkdir -p dist
          if [[ -f CHANGELOG.md ]]; then
            changelog_body="$(awk -v v="${version}" '
              BEGIN { in_section = 0 }
              $0 ~ "^## \\[" v "\\]" { in_section = 1; next }
              in_section && /^## \[/ { exit }
              in_section { print }
            ' CHANGELOG.md)"
          fi

          {
            if [[ -n "${changelog_body}" ]]; then
              printf "%s\n" "${changelog_body}" | sed '/./,$!d'
              echo
            fi
            echo "### Docker image"
            echo "- \`${{ steps.config.outputs.dockerhub_image }}:${version}\`"
          } > dist/release-body.md

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare Docker tags
        id: docker-tags
        run: |
          set -euo pipefail
          {
            echo "tags<<EOF"
            echo "${{ steps.config.outputs.dockerhub_image }}:${{ steps.release.outputs.version }}"
            if [[ "${{ steps.release.outputs.latest }}" == "true" ]]; then
              echo "${{ steps.config.outputs.dockerhub_image }}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.docker-tags.outputs.tags }}
          labels: |
            org.opencontainers.image.title=Discogenius
            org.opencontainers.image.version=${{ steps.release.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ steps.release.outputs.tag }}"
          prerelease="${{ steps.release.outputs.prerelease }}"
          latest="${{ steps.release.outputs.latest }}"

          if gh release view "${tag}" >/dev/null 2>&1; then
            if [[ "${prerelease}" == "true" ]]; then
              gh release edit "${tag}" \
                --title "${tag}" \
                --notes-file dist/release-body.md \
                --prerelease
            else
              gh release edit "${tag}" \
                --title "${tag}" \
                --notes-file dist/release-body.md \
                --latest
            fi
            exit 0
          fi

          if [[ "${prerelease}" == "true" ]]; then
            gh release create "${tag}" \
              --verify-tag \
              --title "${tag}" \
              --notes-file dist/release-body.md \
              --prerelease
          else
            gh release create "${tag}" \
              --verify-tag \
              --title "${tag}" \
              --notes-file dist/release-body.md \
              --latest
          fi

